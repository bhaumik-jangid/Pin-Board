upstream auth_service {
  server auth-service:3001;
  keepalive 32;
}

upstream board_service {
  server board-service:3002;
  keepalive 32;
}

upstream realtime_service {
  server realtime-service:3003;
  keepalive 64;
}

upstream frontend_app {
  server frontend:80;
  keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

server {
  listen 80;
  server_name _;

  client_max_body_size 10M;
  proxy_read_timeout   60s;
  proxy_connect_timeout 10s;

  # Security headers
  add_header X-Frame-Options        "SAMEORIGIN"    always;
  add_header X-Content-Type-Options "nosniff"       always;
  add_header X-XSS-Protection       "1; mode=block" always;

  # ── Auth API ─────────────────────────────────────────────
  # CRITICAL: trailing slash on proxy_pass strips the /api/auth prefix
  # No trailing slash = full path forwarded including /api/auth/...
  location /api/auth/ {
    limit_req zone=auth burst=20 nodelay;
    proxy_pass         http://auth_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Prevent 301 redirect loops on missing trailing slash
    proxy_redirect     off;
  }

  # ── Board API ─────────────────────────────────────────────
  location /api/boards/ {
    limit_req zone=api burst=40 nodelay;
    proxy_pass         http://board_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # ── Handle /api/boards without trailing slash ─────────────
  # This prevents NGINX from issuing a 301 when POST hits /api/boards
  location = /api/boards {
    limit_req zone=api burst=40 nodelay;
    proxy_pass         http://board_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
  }

  # ── Handle /api/auth without trailing slash ───────────────
  location = /api/auth {
    limit_req zone=auth burst=20 nodelay;
    proxy_pass         http://auth_service;
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_redirect     off;
  }

  # ── Socket.IO ─────────────────────────────────────────────
  location /socket.io/ {
    proxy_pass         http://realtime_service;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # ── Health check ──────────────────────────────────────────
  location = /health {
    access_log off;
    return 200 '{"status":"ok","service":"nginx"}';
    add_header Content-Type application/json;
  }

  # ── Frontend SPA ──────────────────────────────────────────
  location / {
    proxy_pass         http://frontend_app;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_cache_bypass $http_upgrade;
  }
}
